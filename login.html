<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f2f2f2;
      }
      .container {
        width: 850px;
        height: 500px;
        display: flex;
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }
      .left {
        flex: 1;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      form {
        width: 100%;
        max-width: 300px;
        text-align: center;
      }
      form h2 {
        margin-bottom: 20px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 20px;
        border: 1px solid #ccc;
        outline: none;
      }
      button {
        margin-top: 10px;
        padding: 10px 30px;
        border: none;
        border-radius: 20px;
        background: #08aca3da;
        color: white;
        cursor: pointer;
      }
      .switch {
        margin-top: 15px;
        font-size: 14px;
      }
      .switch a {
        color: #0e86809f;
        text-decoration: none;
        font-weight: bold;
      }
      .right {
        flex: 1;
        background: linear-gradient(135deg, #38c9c2, #5b86e5);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px;
      }
      .right h1 {
        margin-bottom: 10px;
      }
      .right p {
        max-width: 250px;
      }
      #signup {
        display: none;
      }
      #signup:target {
        display: block;
      }
      #signup:target ~ #login {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div id="login">
          <form>
            <h2>Sign In</h2>
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Password" />
            <button type="submit">Sign In</button>
            <div class="switch">
              Don't have an account? <a href="">Sign Up</a>
            </div>
          </form>
        </div>
        <div id="signup">
          <form>
            <h2>Create Account</h2>
            <input type="text" placeholder="Name" />
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Password" />
            <button type="submit">Sign Up</button>
            <div class="switch">
              Already have an account? <a href="#">Sign In</a>
            </div>
          </form>
        </div>
      </div>
      <div class="right">
        <h1>Welcome</h1>
        <p>Create an account and explore new opportunities.</p>
      </div>
    </div>
  </body>
</html>
